
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Pirámide Chichén Itzá AR</title>
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin:0; overflow:hidden;">
<a-scene embedded arjs="sourceType: webcam;">
<a-marker preset="hiro">

<!-- Base -->
<a-box position="0 0.25 0" depth="2" height="0.5" width="2" color="#c2b280"></a-box>
<a-box position="0 0.6 0" depth="1.6" height="0.4" width="1.6" color="#bfa76a"></a-box>
<a-box position="0 0.9 0" depth="1.2" height="0.4" width="1.2" color="#b59b5a"></a-box>
<a-box position="0 1.2 0" depth="0.8" height="0.4" width="0.8" color="#a68b5b"></a-box>

<!-- Top temple -->
<a-box position="0 1.5 0" depth="0.4" height="0.3" width="0.4" color="#8f7747"></a-box>

</a-marker>
<a-entity camera></a-entity>
</a-scene>
</body>
</html>
